name: Build and Release

# 推送(或合并后打)以 v 开头的 tag 时触发,用该 tag 名作为版本号打包并发布 release。
# 也支持手动触发:填一个版本号,会用它创建 tag 并发布。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号(如 v3.1.11),会用它创建 tag 并发布 release'
        required: true

# 同一 tag 只跑一个发布流程
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # 创建 release / tag、上传产物需要写权限

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      # 固定的 zk_STARK_Validator_V2 产物(v3.1.0)所在的源 release tag。
      # 这四个文件从 v3.1.0 起内容不变,直接从该 release 下载复用。
      ZK_SOURCE_TAG: v3.1.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # 拉全历史,生成发布说明的 git log 需要
          fetch-tags: true    # 拉全 tag,用于计算上一个版本 / changelog 范围

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # go.mod 声明 go 1.17,但依赖用到了 net/netip(需 1.18+),故固定较新版本
          go-version: '1.23'

      - name: 确定版本号与上一个版本
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${{ github.ref_name }}"        # tag 触发:直接用 tag 名
            echo "由 tag 触发,版本号 = $VERSION"
          else
            VERSION="${{ github.event.inputs.version }}"   # 手动触发:用输入的版本号
            echo "手动触发,版本号 = $VERSION"
          fi
          # 取当前最新 release 作为上一个版本(用于 changelog)
          PREV="$(gh release view --json tagName -q .tagName 2>/dev/null || true)"
          # 已存在同名 release 则报错退出,避免覆盖
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "::error::release $VERSION 已存在,请换一个版本号" && exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prev=$PREV" >> "$GITHUB_OUTPUT"

      - name: 生成发布说明
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PREV: ${{ steps.version.outputs.prev }}
        run: |
          set -euo pipefail
          {
            if [ -n "$PREV" ]; then
              echo "Changes since ${PREV}."
              echo
              echo "Changes:"
              git log "${PREV}..HEAD" --no-merges --pretty='- %h %s'
              echo
              echo "**Full Changelog**: ${{ github.server_url }}/${{ github.repository }}/compare/${PREV}...${VERSION}"
            else
              echo "Release ${VERSION}."
              echo
              echo "Changes:"
              git log -n 20 --no-merges --pretty='- %h %s'
            fi
          } > RELEASE_NOTES.md
          echo "---- 发布说明预览 ----"
          cat RELEASE_NOTES.md

      - name: 编译四个平台产物
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GOFLAGS: -mod=mod   # 仓库未提交 go.sum,允许 build 时自动下载依赖并补齐
        run: |
          set -euo pipefail
          mkdir -p dist

          build() {
            local goos="$1" goarch="$2" outdir="$3" ext="$4"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -o "${outdir}/CheckBalance${ext}" cmd/checkbalance/main.go
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -o "${outdir}/VerifyAddress${ext}" cmd/verifyaddress/main.go
            cp example/rpc.json "${outdir}/rpc.json"
            zip -r "dist/${outdir}.zip" "${outdir}"
          }

          build darwin  amd64 "proof-of-reserves-macos-${VERSION}"       ""
          build linux   arm64 "proof-of-reserves-linux-arm64-${VERSION}" ""
          build linux   amd64 "proof-of-reserves-linux-amd64-${VERSION}" ""
          build windows amd64 "proof-of-reserves-windows-${VERSION}"     ".exe"

      - name: 下载固定的 zk_STARK_Validator_V2 产物
        run: |
          set -euo pipefail
          gh release download "$ZK_SOURCE_TAG" \
            --repo "${{ github.repository }}" \
            --pattern 'zk_STARK_Validator_V2_*.zip' \
            --dir dist
          echo "已下载 zk 产物:" && ls -1 dist/zk_STARK_Validator_V2_*.zip

      - name: 创建 Release 并上传全部产物
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$VERSION" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "$VERSION" \
            --notes-file RELEASE_NOTES.md \
            dist/proof-of-reserves-linux-amd64-"$VERSION".zip \
            dist/proof-of-reserves-linux-arm64-"$VERSION".zip \
            dist/proof-of-reserves-macos-"$VERSION".zip \
            dist/proof-of-reserves-windows-"$VERSION".zip \
            dist/zk_STARK_Validator_V2_aarch64-apple-darwin_v3.1.0.zip \
            dist/zk_STARK_Validator_V2_x86_64-apple-darwin_v3.1.0.zip \
            dist/zk_STARK_Validator_V2_x86_64-pc-windows-gnu_v3.1.0.zip \
            dist/zk_STARK_Validator_V2_x86_64-unknown-linux-gnu_v3.1.0.zip
